<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Fuel Cal">
<title>Fuel Cost Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #F2F2F7; color: #1C1C1E;
    min-height: 100vh; padding-bottom: 40px;
  }
  header {
    background: #1565C0; color: white;
    padding: 20px 20px 16px; text-align: center;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header p  { font-size: 12px; opacity: 0.75; margin-top: 4px; }
  .section-title {
    font-size: 11px; font-weight: 600; color: #6E6E73;
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 14px 16px 6px;
  }
  .card { background: white; border-radius: 12px; margin: 0 16px 16px; overflow: hidden; }
  .row {
    display: flex; align-items: center;
    padding: 0 16px; border-top: 0.5px solid #E5E5EA; min-height: 54px; gap: 8px;
  }
  .row:first-of-type { border-top: none; }
  .row label { flex: 1; font-size: 15px; color: #1C1C1E; }
  .row input {
    width: 100px; text-align: right; border: 1px solid #E5E5EA;
    border-radius: 6px; outline: none;
    font-size: 15px; color: #1C1C1E; background: #F9F9F9;
    padding: 6px 8px; font-family: inherit;
  }
  .row input:focus { border-color: #1565C0; background: white; }
  .row .unit { font-size: 13px; color: #8E8E93; min-width: 55px; }

  .result-row {
    display: flex; align-items: center;
    padding: 0 16px; border-top: 0.5px solid #E5E5EA; min-height: 52px;
  }
  .result-row label { flex: 1; font-size: 15px; color: #1C1C1E; }
  .result-row .result-val { font-size: 15px; font-weight: 600; color: #1565C0; }
  .result-row .result-unit { font-size: 13px; color: #8E8E93; margin-left: 6px; }

  .cost-card {
    background: #E3F2FD; border-radius: 12px;
    margin: 0 16px 16px; padding: 18px; text-align: center;
  }
  .cost-card .cost-label { font-size: 13px; color: #1565C0; margin-bottom: 6px; }
  .cost-card .cost-value { font-size: 38px; font-weight: 700; color: #1565C0; }

  .error-box {
    background: #FFF3F3; border: 1px solid #FFCDD2; border-radius: 10px;
    margin: 0 16px 12px; padding: 12px 14px;
    font-size: 13px; color: #C62828; display: none;
  }
  .error-box.visible { display: block; }

  .btn-clear {
    display: block; margin: 0 16px; width: calc(100% - 32px);
    padding: 14px; background: white; border: 0.5px solid #D1D1D6;
    border-radius: 10px; font-size: 15px; color: #D32F2F;
    font-family: inherit; cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <h1>⛽ Fuel Cost Calculator</h1>
  <p>Calculate trip fuel cost instantly</p>
</header>

<div class="section-title">Inputs</div>
<div class="card">
  <div class="row">
    <label>Fuel price</label>
    <input id="price" type="number" inputmode="decimal" placeholder="e.g. 151" value="151">
    <span class="unit">p / L</span>
  </div>
  <div class="row">
    <label>Distance</label>
    <input id="miles" type="number" inputmode="decimal" placeholder="e.g. 60" value="60">
    <span class="unit">miles</span>
  </div>
  <div class="row">
    <label>Consumption</label>
    <input id="cons" type="number" inputmode="decimal" placeholder="e.g. 7.3" value="7.3">
    <span class="unit">L / 100km</span>
  </div>
</div>

<div class="error-box" id="error-box"></div>

<div class="section-title">Results</div>
<div class="card">
  <div class="result-row">
    <label>Distance (km)</label>
    <span class="result-val" id="res-km">—</span>
    <span class="result-unit">km</span>
  </div>
  <div class="result-row">
    <label>Fuel used</label>
    <span class="result-val" id="res-litres">—</span>
    <span class="result-unit">L</span>
  </div>
  <div class="result-row">
    <label>Efficiency</label>
    <span class="result-val" id="res-mpg">—</span>
    <span class="result-unit">MPG</span>
  </div>
</div>

<div class="cost-card">
  <div class="cost-label">Trip fuel cost</div>
  <div class="cost-value" id="cost-big">—</div>
</div>

<button class="btn-clear" onclick="clearAll()">Clear all</button>

<script>
function calculate() {
  const price = parseFloat(document.getElementById("price").value);
  const miles = parseFloat(document.getElementById("miles").value);
  const cons  = parseFloat(document.getElementById("cons").value);
  const errBox = document.getElementById("error-box");

  if (isNaN(price) || isNaN(miles) || isNaN(cons)) {
    errBox.textContent = "Please enter valid numbers in all fields";
    errBox.className = "error-box visible";
    ["res-km","res-litres","res-mpg"].forEach(id => document.getElementById(id).textContent = "—");
    document.getElementById("cost-big").textContent = "—";
    return;
  }

  errBox.className = "error-box";

  const km     = miles * 1.60934;
  const litres = (cons / 100) * km;
  const cost   = (litres * price) / 100;
  const mpg    = 282.481 / cons;

  document.getElementById("res-km").textContent     = km.toFixed(1);
  document.getElementById("res-litres").textContent = litres.toFixed(2);
  document.getElementById("res-mpg").textContent    = mpg.toFixed(1);
  document.getElementById("cost-big").textContent   = "£" + cost.toFixed(2);
}

function clearAll() {
  ["price","miles","cons"].forEach(id => document.getElementById(id).value = "");
  ["res-km","res-litres","res-mpg"].forEach(id => document.getElementById(id).textContent = "—");
  document.getElementById("cost-big").textContent = "—";
  document.getElementById("error-box").className = "error-box";
}

["price","miles","cons"].forEach(id => {
  document.getElementById(id).addEventListener("input", calculate);
  document.getElementById(id).addEventListener("blur",  calculate);
});

calculate();
</script>
</body>
</html>
